kind = "mobile"
previewPath = "/"
title = "Tax Quest - Learn & Play"
version = "1.0.0"
id = "artifacts/tax-games"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24303

[services.development]
run = "pnpm --filter @workspace/tax-games run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tax-games", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tax-games", "run", "serve" ]

[services.env]
PORT = "24303"
BASE_PATH = "/"
